name: Deploy para o Firebase Hosting ao fazer Push

on:
  push:
    branches:
      - main  # Altere para "master" se a sua branch principal tiver esse nome

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-size: 22.19.0 # Casando com a sua versão local do Node
          cache: 'npm'

      - name: Instalar Dependências
        run: npm ci --legacy-peer-deps

      - name: Compilar o Projeto Angular
        run: npm run build -- --configuration=production

      - name: Deploy para Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PORTFOLIO_MAGNO_PIZON }}'
          channelId: live